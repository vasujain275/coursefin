# nfpm configuration for coursefin
# Used by GitHub Actions to produce .deb and .rpm packages
# Version is injected at CI time via: nfpm package --config packaging/nfpm.yaml
# Environment variable VERSION must be set before running nfpm.

name: coursefin
arch: amd64
platform: linux

# Version is injected from the git tag by the CI workflow via the VERSION env var.
# nfpm supports ${VERSION} variable expansion.
version: ${VERSION}

section: utils
priority: optional
maintainer: Vasu Jain <vasujain275@gmail.com>
description: |
  CourseFin - Course progress tracker
  A desktop application for tracking your learning progress across courses.
vendor: Vasu Jain
homepage: https://github.com/vasujain275/coursefin
license: MIT

overrides:
  deb:
    depends:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0t64 | libgtk-3-0
      - libglib2.0-0t64 | libglib2.0-0
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - gstreamer1.0-libav
    recommends:
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-plugins-ugly
  rpm:
    depends:
      - webkit2gtk4.1
      - gtk3
      - glib2
      - gstreamer1-plugins-base
      - gstreamer1-plugins-good
      - gstreamer1-plugin-libav
    recommends:
      - gstreamer1-plugins-bad-free
      - gstreamer1-plugins-ugly-free

contents:
  # The main binary
  - src: ./build/bin/coursefin
    dst: /usr/bin/coursefin
    file_info:
      mode: 0755

  # Desktop entry for application launchers
  - src: ./packaging/coursefin.desktop
    dst: /usr/share/applications/coursefin.desktop
    file_info:
      mode: 0644

  # Application icon (PNG from build/appicon.png)
  - src: ./build/appicon.png
    dst: /usr/share/icons/hicolor/256x256/apps/coursefin.png
    file_info:
      mode: 0644

  # Symlink so icon resolution also works at 512x512
  - dst: /usr/share/icons/hicolor/512x512/apps/coursefin.png
    type: symlink
    src: /usr/share/icons/hicolor/256x256/apps/coursefin.png
